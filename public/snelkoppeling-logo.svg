<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 215" width="200" height="215">
  <defs>
    <!-- Red flame gradient -->
    <linearGradient id="redFlame" x1="40%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ff1a00"/>
      <stop offset="100%" stop-color="#cc0010"/>
    </linearGradient>

    <!-- Orange flame gradient -->
    <linearGradient id="orangeFlame" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>

    <!-- Metallic ring gradient -->
    <linearGradient id="ringMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#888"/>
      <stop offset="25%"  stop-color="#ddd"/>
      <stop offset="50%"  stop-color="#f8f8f8"/>
      <stop offset="75%"  stop-color="#ddd"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>

    <!-- Inner ring shadow -->
    <radialGradient id="ringInnerShadow" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#00000022"/>
    </radialGradient>

    <filter id="dropShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- ===== RING: U-shape, opening at top, closed at bottom ===== -->
  <!-- Arc from upper-left, sweeping DOWN and around to upper-right -->
  <!-- Center of ring: (100, 152), radius 55 -->
  <!-- Left opening ~210° point: (100 + 55*cos210, 152 + 55*sin210) = (100-47.6, 152-27.5) = (52, 124) -->
  <!-- Right opening ~330° point: (100 + 55*cos330, 152 + 55*sin330) = (100+47.6, 152-27.5) = (148, 124) -->

  <path
    d="M 52,124 A 55,55 0 1,0 148,124"
    fill="none"
    stroke="url(#ringMetal)"
    stroke-width="21"
    stroke-linecap="round"
    filter="url(#dropShadow)"
  />
  <!-- Highlight on top of ring -->
  <path
    d="M 52,124 A 55,55 0 1,0 148,124"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- Small nozzle/stem at bottom of ring -->
  <rect x="91" y="196" width="18" height="16" rx="4" fill="url(#ringMetal)" filter="url(#dropShadow)"/>
  <rect x="94" y="197" width="6" height="14" rx="2" fill="white" opacity="0.3"/>

  <!-- ===== RED FLAME (large, left, behind orange) ===== -->
  <path
    d="
      M 92,14
      C 80,28  58,42  58,70
      C 52,56  55,36  65,24
      C 46,46  40,72  48,98
      C 52,114 64,126 76,132
      C 70,116 72,100 80,90
      C 76,106 80,120 90,126
      C 88,108 90,88  96,72
      C 98,92  96,114 94,130
      L 110,130
      C 116,114 116,92  118,76
      C 124,92  122,110 118,126
      C 128,120 134,108 132,94
      C 136,76  128,52  116,34
      C 122,46  120,62  112,72
      C 110,50  100,28  92,14
      Z
    "
    fill="url(#redFlame)"
    filter="url(#dropShadow)"
  />

  <!-- ===== ORANGE FLAME (smaller, center-right, in front of red) ===== -->
  <path
    d="
      M 112,52
      C 106,64  96,74  97,90
      C 93,80   94,66  100,56
      C 90,70   88,88  93,104
      C 96,114  104,122 112,126
      C 108,114 110,102 116,94
      C 114,106 118,118 124,124
      C 132,114 132,98  126,86
      C 132,96  132,110 128,120
      C 136,110 138,96  134,84
      C 138,68  130,50  120,40
      C 126,52  124,66  118,76
      C 116,60  116,44  112,52
      Z
    "
    fill="url(#orangeFlame)"
    filter="url(#dropShadow)"
  />
</svg>
